name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tenpulse
          POSTGRES_PASSWORD: tenpulse123
          POSTGRES_DB: tenpulse
        ports:
          - 5455:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations and seed
        run: |
          npm run db:migrate
          npm run db:seed
        env:
          DATABASE_URL: postgresql://tenpulse:tenpulse123@localhost:5455/tenpulse?schema=public

      - name: Run unit tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Start API and run integration tests
        env:
          DATABASE_URL: postgresql://tenpulse:tenpulse123@localhost:5455/tenpulse?schema=public
          JWT_SECRET: tenpulse-ci-secret
          PORT: 4015
        run: |
          npm run start:prod &
          sleep 5
          bash ../tests/integration.sh

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4015/api
